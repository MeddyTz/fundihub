workflows:
  ios-debug:
    name: FundiHub iOS Debug
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          if [ ! -f Podfile ]; then
            pod init
          fi
          sed -i '' "1s/^/platform :ios, '14.0'\n/" Podfile
          pod install --repo-update
          cd ..
      - name: Build iOS no codesign
        script: flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app