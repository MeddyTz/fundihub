workflows:
  ios-debug:
    name: FundiHub iOS Debug
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios

          if [ ! -f Podfile ]; then
            pod init
          fi

          echo "platform :ios, '15.0'" > Podfile

          pod install --repo-update

          cd ..

      - name: Build iOS no codesign
        script: flutter build ios --debug --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app