workflows:
  ios-debug:
    name: FundiHub iOS Debug
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Clean project
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          rm -rf $HOME/Library/Developer/Xcode/DerivedData

      - name: Get packages
        script: |
          flutter pub get

      - name: Force iOS 15 target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj
          grep IPHONEOS_DEPLOYMENT_TARGET ios/Runner.xcodeproj/project.pbxproj

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS no codesign
        script: |
          flutter build ios --debug --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app