workflows:
  ios-debug:
    name: FundiHub iOS Debug
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          rm -f Podfile
          flutter pub get
          pod install --repo-update
          cd ..

      - name: Set iOS deployment target
        script: |
          sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/' ios/Podfile

      - name: Build iOS no codesign
        script: flutter build ios --debug --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app